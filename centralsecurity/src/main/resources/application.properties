# centralsecurity library — default/fallback properties
# These are NOT used when deployed as a library dependency.
# Each consuming microservice defines its own application.properties.
#
# -------------------------------------------------------------------------
# REQUIRED in consuming service:
# -------------------------------------------------------------------------
# jwt.secret=<base64-encoded key, minimum 32 characters>
#   Generate one with: openssl rand -base64 32
#
# -------------------------------------------------------------------------
# OPTIONAL (defaults shown):
# -------------------------------------------------------------------------
# jwt.expiration-ms=86400000
# jwt.public-paths=/api/auth/**
# jwt.auth-endpoints-enabled=true
#
# -------------------------------------------------------------------------
# DATABASE (required by consuming service — JPA entities need a datasource)
# -------------------------------------------------------------------------
# spring.datasource.url=jdbc:mysql://localhost:3306/yourdb
# spring.datasource.username=youruser
# spring.datasource.password=yourpassword
# spring.jpa.hibernate.ddl-auto=update

spring.application.name=centralsecurity
