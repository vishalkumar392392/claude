# centralsecurity library — default properties
# These are the LOWEST priority properties in the Spring Boot property chain.
# Any value in a consuming service's application.properties overrides these.

# JPA defaults
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Central user database — 3-level fallback chain:
#
#   Level 1 (highest): CENTRALSECURITY_DATASOURCE_* env vars  → AWS RDS / production
#   Level 2          : spring.datasource.*                     → consuming microservice's own DB config
#   Level 3 (lowest) : hardcoded local defaults                → localhost MySQL for local dev
#
# AWS deployment — set these env vars in ECS / EC2 / Beanstalk, consuming service picks them up automatically:
#   CENTRALSECURITY_DATASOURCE_URL      = jdbc:mysql://<rds-endpoint>:3306/<dbname>
#   CENTRALSECURITY_DATASOURCE_USERNAME = <rds-username>
#   CENTRALSECURITY_DATASOURCE_PASSWORD = <rds-password>
centralsecurity.datasource.url=${CENTRALSECURITY_DATASOURCE_URL:${spring.datasource.url:jdbc:mysql://localhost:3306/student}}
centralsecurity.datasource.username=${CENTRALSECURITY_DATASOURCE_USERNAME:${spring.datasource.username:root}}
centralsecurity.datasource.password=${CENTRALSECURITY_DATASOURCE_PASSWORD:${spring.datasource.password:8143486643}} #NOSONAR local dev default
centralsecurity.datasource.driver-class-name=${CENTRALSECURITY_DATASOURCE_DRIVER_CLASS_NAME:${spring.datasource.driver-class-name:com.mysql.cj.jdbc.Driver}}
